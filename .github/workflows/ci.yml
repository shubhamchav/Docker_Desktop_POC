name: Build and scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  IMAGE_NAME: java-vulnerable-scan-poc

jobs:
  build-and-trivy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build shaded JAR (local sanity check)
        working-directory: ${{ github.workspace }}
        run: mvn -ntp -B package -DskipTests

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      # -------------------------------
      # 📊 Docker Scout JSON report (optional)
      # -------------------------------
      # Install Scout
      - name: Install Docker Scout
        run: |
          mkdir -p ~/.docker/cli-plugins
          curl -sSL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh | sh

      # Verify
      - name: Verify Docker Scout
        run: docker scout version
     
      - name: Docker Scout (log output)
        run: |
          docker scout cves ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Docker Scout (fail on CRITICAL vulnerabilities)
        run: |
          docker scout cves ${{ env.IMAGE_NAME }}:${{ github.sha }} \
          --exit-code \
          --only-severity critical

      # -------------------------------
      # 🔍 Trivy Scan (log output)
      # -------------------------------
      - name: Trivy (table, CI log)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN
          format: table
          exit-code: "0"

      # -------------------------------
      # 📄 Trivy JSON report
      # -------------------------------
      - name: Trivy (JSON report for comparison with Scout / Snyk)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN
          format: json
          output: trivy-image-report.json
          exit-code: "0"

      - name: Upload Trivy JSON report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.json

      # -------------------------------
      # 🛡️ Trivy SARIF (GitHub Security tab)
      # -------------------------------
      - name: Trivy SARIF
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          vuln-type: os,library
          format: sarif
          output: trivy-results.sarif

      - name: Upload SARIF to GitHub Security (if enabled)
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
