name: Build and scan

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  IMAGE_NAME: java-vulnerable-scan-poc

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------
      # Checkout source
      # -------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------
      # Setup Java
      # -------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # -------------------------------
      # Build application
      # -------------------------------
      - name: Build shaded JAR
        run: mvn -ntp -B clean package -DskipTests

      # -------------------------------
      # Build Docker image
      # -------------------------------
      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      # -------------------------------
      # Install Docker Scout
      # -------------------------------
      - name: Install Docker Scout
        run: |
          mkdir -p ~/.docker/cli-plugins
          curl -sSL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh | sh

      # -------------------------------
      # Docker Hub Login
      # -------------------------------
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -------------------------------
      # Verify Docker Scout
      # -------------------------------
      - name: Verify Docker Scout
        run: docker scout version

      # -------------------------------
      # Docker Scout Scan
      # (No pipeline failure)
      # -------------------------------
      - name: Docker Scout scan
        run: |
          docker scout cves ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --only-severity critical,high,medium,low || true

      # -------------------------------
      # Trivy Scan - Table Output
      # -------------------------------
      - name: Trivy scan (table output)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN
          format: table
          exit-code: "0"

      # -------------------------------
      # Trivy JSON Report
      # -------------------------------
      - name: Trivy JSON report
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN
          format: json
          output: trivy-image-report.json
          exit-code: "0"

      # -------------------------------
      # Upload Trivy JSON Artifact
      # -------------------------------
      - name: Upload Trivy JSON report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.json

      # -------------------------------
      # Trivy SARIF Report
      # -------------------------------
      - name: Trivy SARIF report
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          vuln-type: os,library
          format: sarif
          output: trivy-results.sarif
          exit-code: "0"

      # -------------------------------
      # Upload SARIF to GitHub Security
      # -------------------------------
      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
