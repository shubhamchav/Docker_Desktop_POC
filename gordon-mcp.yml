version: 1

mcpServers:
  github:
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-github"

    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GH_TOKEN}

  jira:
    command: npx
    args:
      - -y
      - "mcp-atlassian"

    env:
      ATLASSIAN_HOST: ${JIRA_HOST}
      ATLASSIAN_USERNAME: ${JIRA_EMAIL}
      ATLASSIAN_API_TOKEN: ${JIRA_API_TOKEN}

workspace:
  root: /workspace
